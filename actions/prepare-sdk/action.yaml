name: 'Prepare SDK'
description: 'Unified SDK preparation for multiple architectures'
inputs:
  sdk_name:
    description: 'The full name of the SDK tarball (without extension)'
    required: true
runs:
  using: "composite"
  steps:
    - name: Download and Initialize SDK
      shell: bash
      run: |
        set -e

        wget -O ${{ inputs.sdk_name }}.tar.zst "https://l.867678.xyz/$SDK_NAME.tar.zst"

        tar -xvf "$SDK_NAME.tar.zst"
        rm "$SDK_NAME.tar.zst"
        cd "$SDK_NAME"

        make defconfig
        ./scripts/feeds update -a
        ./scripts/feeds install -a
